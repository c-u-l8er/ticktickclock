<!doctype html>
<html lang="en">
    <head>
        <link
            rel="apple-touch-icon"
            sizes="180x180"
            href="/apple-touch-icon.png"
        />
        <link
            rel="icon"
            type="image/png"
            sizes="32x32"
            href="/favicon-32x32.png"
        />
        <link
            rel="icon"
            type="image/png"
            sizes="16x16"
            href="/favicon-16x16.png"
        />
        <link rel="manifest" href="/site.webmanifest" />

        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <script>
            // This will help us detect when Clerk is loaded
            window.clerkAsyncInit = function () {
                console.log("Clerk async initialization complete");
            };
        </script>
        <script
            async
            crossorigin="anonymous"
            data-clerk-publishable-key="%sveltekit.env.PUBLIC_CLERK_PUBLISHABLE_KEY%"
            onload="if(window.clerkAsyncInit)window.clerkAsyncInit()"
            src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@4/dist/clerk.browser.js"
            type="text/javascript"
        ></script>
        %sveltekit.head%
    </head>
    <body
        data-sveltekit-preload-data="hover"
        class="bg-gray-100 dark:bg-gray-900"
    >
        <div style="display: contents">%sveltekit.body%</div>
    </body>
</html>
